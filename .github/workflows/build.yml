name: Firmware Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Python tools
        run: pip install platformio esptool

      - name: Prepare RNode Arduino dependencies
        run: make -C vendor/rnode_firmware prep-cardputer_adv

      - name: Build release package
        run: make package

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ratcom-cardputer-adv-firmware
          path: dist/*

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Python tools
        run: pip install platformio esptool

      - name: Prepare RNode Arduino dependencies
        run: make -C vendor/rnode_firmware prep-cardputer_adv

      - name: Build release package
        run: make package

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(--generate-notes)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          artifacts=(
            dist/ratcom-cardputer-adv-full.bin
            dist/ratcom-cardputer-adv-full.zip
            dist/ratcom-cardputer-adv-ratcom-only.bin
            dist/ratcom-cardputer-adv-ratcom-only.zip
            dist/ratcom-cardputer-adv-rnode-only.bin
            dist/ratcom-cardputer-adv-rnode-only.zip
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${artifacts[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${artifacts[@]}" "${release_args[@]}"
          fi
